name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint + Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff==0.4.4 black==24.4.2

      - name: Run ruff (linting)
        run: ruff check app/ tests/ scripts/

      - name: Run black (format check)
        run: black --check app/ tests/ scripts/

  # ── Unit + API Tests ─────────────────────────────────────────────────────────
  test:
    name: Tests (unit + api)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install a minimal subset to keep CI fast (no InsightFace download)
          pip install \
            fastapi==0.111.0 \
            uvicorn==0.29.0 \
            python-multipart==0.0.9 \
            pydantic==2.7.1 \
            pydantic-settings==2.2.1 \
            qdrant-client==1.9.1 \
            structlog==24.1.0 \
            opencv-python-headless==4.9.0.80 \
            numpy==1.26.4 \
            pytest==8.2.0 \
            pytest-asyncio==0.23.6 \
            pytest-cov==5.0.0 \
            httpx==0.27.0

      - name: Run unit tests
        env:
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
          APP_ENV: development
        run: |
          pytest tests/unit/ tests/api/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-fail-under=70 \
            -p no:warnings

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Docker build check ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: face-match-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip model download in CI to keep build time < 5 min
          build-args: |
            SKIP_MODEL_DOWNLOAD=1

  # ── Deployment readiness check ────────────────────────────────────────────────
  deployment-check:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          files=(
            "Dockerfile"
            "docker-compose.yml"
            "requirements.txt"
            "app/main.py"
            "RESULTS.md"
            "AI_LOG.md"
            "README.md"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          exit $missing

      - name: Check render.yaml exists (deployment config)
        run: |
          if [ -f "render.yaml" ]; then
            echo "render.yaml present ✓"
          else
            echo "render.yaml not found — add for one-click Render deploy"
          fi
