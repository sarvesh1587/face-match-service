version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  face-match-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  qdrant_storage:
    driver: local
  insightface_cache:
    driver: local

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Qdrant vector database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: face-match-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - face-match-net

  # ── Face Match API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: face-match-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - insightface_cache:/home/appuser/.insightface
      - ./data:/app/data          # for sample face images
    environment:
      # Qdrant — use service name, not localhost
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: face_embeddings

      # InsightFace
      INSIGHTFACE_MODEL: buffalo_l
      INSIGHTFACE_CTX_ID: -1      # CPU mode

      # Matching
      MATCH_THRESHOLD: "0.40"
      TOP_K: "5"

      # App
      APP_ENV: development
      LOG_LEVEL: INFO
      DEBUG: "false"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # InsightFace init takes ~60s on first run
    networks:
      - face-match-net

  # ── Qdrant Web UI (optional, dev only) ────────────────────────────────────
  qdrant-ui:
    image: qdrant/qdrant-web-ui:latest
    container_name: face-match-qdrant-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    profiles:
      - ui    # only started with: docker compose --profile ui up
    networks:
      - face-match-net
